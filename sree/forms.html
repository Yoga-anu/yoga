<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"href="style.css"type="text/css">
    <title>forms</title>
</head>


<body>
    <form action="forms.html"method="GET"></form>
    <div  class="overall">

    <div class="fo">
        <h1>form tag:</h1>
    </div>


    <div class="image">
        <img src="th.jfif" alt="background" >

    </div>
        

    <div class="name">
        <label for="username">user name:</label>
        <input type="text" name="username " id="username">
    </div>

    <div class="pass">
        <label for="password">password:</label>
        <input type="password" name="password " id="password">
    </div>


    <div class="yob">
        <label for="year of bday">YOB:</label>
        <input type="number" name="YOB " id="YOB">
    </div>


    <div class="em">
        <label for="email">email:</label>
        <input type="text" name="email " id="email">
    </div>

    <div class="ab">
        <label for="about">about:</label>
        <textarea name="about" id="about">About mee.....</textarea>
    </div>


    <div class="che">
        <input type="checkbox" name="sms alert" id="sms">
        <label for="sms alert">sms</label>
        <input type="checkbox" name="email alert" id="email alert">
        <label for="email alert">email alert</label>
    </div>


    <div class="gen">
        <label for="gender">gender:</label>
        <input type="radio" name="gender" id="male">
        <label for="male">male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">female</label>
    </div>


    <div class="sta">
        <label for="state">state:</label>
        <select name="state" id="state">
            <option value="tamilnadu">TamilNadu</option>
            <option value="AP">AP</option>
            <option value="kerala">kerala</option>
            <option value="chennai">chennai</option>
        </select>
    </div>

    <div class="fi">
        <label for="file">Resume:</label>
        <input type="file" id="file" name="file">
    </div>

    <button type="Submit">sing up</button>
    <button type="reset">Reset</button>

</div>
</body>
</html>
